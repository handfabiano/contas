<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="Sistema Financeiro para Controle de Contas a Pagar">
    <title>Sistema Financeiro</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="authGate" class="container">
        <header>
            <h1>💰 Sistema Financeiro</h1>
            <p>Entrar</p>
        </header>

        <div id="authAlert"></div>

        <form id="formLogin" class="config-section">
            <div class="form-group">
                <label for="authEmail">E-mail</label>
                <input type="email" id="authEmail" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label for="authPassword">Senha</label>
                <input type="password" id="authPassword" required placeholder="Sua senha">
            </div>
            <button type="submit" class="btn" id="btnLogin">Entrar</button>
        </form>
    </div>

    <div id="appContainer" class="container hidden">
        <header>
            <h1>💰 Sistema Financeiro</h1>
            <p>Controle de Contas a Pagar</p>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="openTab('lancamento')">Novo Lançamento</button>
            <button class="tab" onclick="openTab('contas')">Minhas Contas</button>
            <button class="tab" onclick="openTab('fundos')">Prestação de Contas</button>
            <button class="tab" onclick="openTab('relatorios')">Relatórios</button>
            <button class="tab" onclick="openTab('config')">Configurações</button>
        </div>

        <div id="lancamento" class="tab-content active"></div>
        <div id="contas" class="tab-content"></div>
        <div id="fundos" class="tab-content"></div>
        <div id="relatorios" class="tab-content"></div>
        <div id="config" class="tab-content"></div>
    </div>

    <!-- Supabase SDK + Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/utils-fixed.js"></script>
    <script src="js/lancamentos.js"></script>
    <script src="js/contas.js"></script>
    <script src="js/fundos.js"></script>
    <script src="js/relatorios-simple.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
